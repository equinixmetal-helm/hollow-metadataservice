{{- if and (index .Values "ingress-nginx-metadata" "enabled") (index .Values "ingress-nginx" "enabled") -}}
{{- $name := "" -}}
{{- if (index .Values "ingress-nginx-metadata" "name") }}
{{- $name = (index .Values "ingress-nginx-metadata" "name") -}}
{{ else }}
{{- $name = print (include "common.names.fullname" .) "-metadata" -}}
{{ end -}}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  {{- if index .Values "ingress-nginx-metadata" "labels" -}}
  labels:
    {{- include "ingress-nginx-metadata.labels" . | nindent 4 }}
  {{ end }}
  {{- if index .Values "ingress-nginx-metadata" "annotations" }}
  annotations: {{ toYaml (index .Values "ingress-nginx-metadata" "annotations") | nindent 4}}
  {{- end }}
spec:
  ingressClassName: nginx-metadata
  rules:
    {{- range (index .Values "ingress-nginx-metadata" "hostnames") }}
    - host: {{ . }}
      http:
        paths:
          - path: /
            {{- if $.Values.ingress.publicPaths -}}
              (
                {{- range $index,$path := $.Values.ingress.publicPaths }}
                  {{- if $index }}|{{ end }}
                  {{- $path }}
                {{- end -}}
              )
            {{- end }}
            backend:
              service:
                name: {{ $name }}
                port:
                  name: http
            pathType: ImplementationSpecific
    {{- end }}
  tls:
    - hosts:
      {{- range (index .Values "ingress-nginx-metadata" "hostnames") }}
      - {{ . }}
      {{- end }}
      secretName: {{ index .Values "ingress-nginx-metadata" "tlsSecretName" }}
{{ end }}
